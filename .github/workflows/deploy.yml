name: Deploy Widgets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Cleanup old files
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: "deploy"
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: rm -rf /var/www/home/*

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: "deploy"
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          source: "build/*"
          target: "/var/www/home"
          strip_components: 1
