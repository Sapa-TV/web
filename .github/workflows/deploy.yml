name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Clean SvelteKit cache
        run: |
          rm -rf .svelte-kit node_modules/.vite
          npx svelte-kit sync

      - name: Build
        run: npm run build

      - name: Check build output
        if: always()
        run: |
          echo "=== Checking .svelte-kit/output ==="
          ls -la .svelte-kit/output/ 2>/dev/null || echo "Directory not found"
          ls -la .svelte-kit/output/client/ 2>/dev/null || echo "Client dir not found"

      - name: Deploy to VPS
        uses: easingthemes/ssh-deploy@v6.0.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          REMOTE_HOST: ${{ secrets.HOST }}
          REMOTE_USER: "deploy"
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          SOURCE: "build/"
          TARGET: "/var/www/home"
          ARGS: "-rlgoDzvc --delete"
